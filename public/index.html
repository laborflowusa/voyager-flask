<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voyager — Find My Deal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --night: #080c14;
      --deep: #0d1525;
      --card: #111827;
      --border: #1e2d45;
      --accent: #f4a832;
      --accent2: #e8734a;
      --sky: #4a9eff;
      --text: #e8edf5;
      --muted: #7a8fa8;
      --success: #34d399;
    }

    html, body {
      height: 100%;
      background: var(--night);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 70%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(2px 2px at 25% 45%, rgba(244,168,50,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 25%, rgba(74,158,255,0.2) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(13,21,37,0.9) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--text);
    }

    .header-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: rgba(244,168,50,0.12);
      border: 1px solid rgba(244,168,50,0.25);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.6s ease;
      width: 0%;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 12px;
      animation: msgIn 0.35s ease both;
      max-width: 88%;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    .avatar.bot {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .avatar.user {
      background: linear-gradient(135deg, var(--sky), #6366f1);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.65;
      max-width: 100%;
    }

    .message.bot .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: linear-gradient(135deg, rgba(74,158,255,0.2), rgba(99,102,241,0.2));
      border: 1px solid rgba(74,158,255,0.3);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .typing span:nth-child(3) { animation-delay: 0.4s; background: var(--sky); }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .rec-card {
      background: linear-gradient(135deg, rgba(244,168,50,0.08), rgba(232,115,74,0.08));
      border: 1px solid rgba(244,168,50,0.3);
      border-radius: 16px;
      padding: 20px;
      margin-top: 8px;
      animation: msgIn 0.5s ease both;
    }

    .rec-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .rec-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--accent);
      background: rgba(244,168,50,0.15);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .rec-park {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .rec-summary {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 14px;
    }

    .rec-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .rec-stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .rec-stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .rec-stat-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
    }

    .rec-cta {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .rec-cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .rec-cta:active { transform: translateY(0); }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 10px;
      flex-shrink: 0;
    }

    .quick-btn {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(244,168,50,0.08);
    }

    .input-area {
      padding: 14px 20px 20px;
      background: rgba(8,12,20,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      min-height: 46px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
      outline: none;
    }

    .input-box::placeholder { color: var(--muted); }
    .input-box:focus { border-color: rgba(244,168,50,0.4); }

    .send-btn {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.9; transform: scale(1.04); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }

    .intro-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      margin: 8px 0 4px;
      animation: msgIn 0.5s ease both;
    }

    .intro-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .intro-title {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .intro-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 380px;
      margin: 0 auto 20px;
    }

    .intro-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .intro-tag {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .rec-stats { grid-template-columns: 1fr; }
      .header { padding: 14px 16px; }
      .chat-area { padding: 16px 12px; }
      .input-area { padding: 12px 12px 16px; }
      .quick-replies { padding: 0 12px 8px; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <a href="/" class="logo">
      <div class="logo-icon">🧭</div>
      <span class="logo-text">Voyager</span>
    </a>
    <div class="header-badge">AI Deal Finder</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="intro-card">
      <div class="intro-icon">✈️</div>
      <div class="intro-title">Find Your Family's Perfect Deal</div>
      <div class="intro-sub">Tell me about your family and I'll scan live pricing across Disney, Universal, hotels, and 50+ partners to find your best option.</div>
      <div class="intro-tags">
        <span class="intro-tag">🎢 Theme Parks</span>
        <span class="intro-tag">🏨 Hotels</span>
        <span class="intro-tag">🚢 Cruises</span>
        <span class="intro-tag">💰 Real 2026 Prices</span>
      </div>
    </div>
  </div>

  <div class="quick-replies" id="quickReplies">
    <button class="quick-btn" onclick="sendQuick('Family of 4 with kids ages 8 and 11')">👨‍👩‍👧‍👦 Family of 4</button>
    <button class="quick-btn" onclick="sendQuick('We want to visit this summer 2026')">☀️ Summer 2026</button>
    <button class="quick-btn" onclick="sendQuick('Our budget is around $3,000 total')">💵 ~$3K budget</button>
    <button class="quick-btn" onclick="sendQuick('We love Harry Potter and thrill rides')">⚡ Harry Potter fans</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        class="input-box"
        id="userInput"
        placeholder="Tell me about your family..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">No email required · Free to use · Real deals</div>
  </div>

</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const progressFill = document.getElementById('progressFill');
  const quickReplies = document.getElementById('quickReplies');

  let messages = [];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendQuick(text) {
    userInput.value = text;
    sendMessage();
  }

  function addBotMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.innerHTML = `
      <div class="avatar bot">🧭</div>
      <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
    `;
    chatArea.appendChild(msg);
    scrollBottom();
  }

  function addUserMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'message user';
    msg.innerHTML = `
      <div class="avatar user">👤</div>
      <div class="bubble">${text}</div>
    `;
    chatArea.appendChild(msg);
    scrollBottom();
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'message bot';
    el.id = 'typing';
    el.innerHTML = `
      <div class="avatar bot">🧭</div>
      <div class="bubble typing"><span></span><span></span><span></span></div>
    `;
    chatArea.appendChild(el);
    scrollBottom();
    return el;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function scrollBottom() {
    setTimeout(() => {
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 50);
  }

  function showRecommendation(rec) {
    const link = rec.affiliate_link || 'https://gyg.me/KBoe1F8i';
    const card = document.createElement('div');
    card.className = 'rec-card';
    card.innerHTML = `
      <div class="rec-header">
        <span class="rec-badge">✦ VOYAGER PICK</span>
      </div>
      <div class="rec-park">🎯 ${rec.park || 'Universal Orlando Resort'}</div>
      <div class="rec-summary">${rec.summary || 'Based on your answers, Universal Orlando offers the best value for your family vacation.'}</div>
      <div class="rec-stats">
        <div class="rec-stat">
          <div class="rec-stat-label">Estimated Savings</div>
          <div class="rec-stat-value">${rec.savings || 'Save ~$1,200 vs Disney'}</div>
        </div>
        <div class="rec-stat">
          <div class="rec-stat-label">Best Move Right Now</div>
          <div class="rec-stat-value" style="color: var(--accent); font-size:12px;">${rec.best_deal || 'Book early 2026 rates before Epic Universe opens'}</div>
        </div>
      </div>
      <a href="${link}" target="_blank" rel="noopener" class="rec-cta">
        🎟️ See Live Deals & Book Now →
      </a>
    `;
    chatArea.appendChild(card);
    scrollBottom();
    progressFill.style.width = '100%';
    quickReplies.innerHTML = `
      <button class="quick-btn" onclick="resetChat()">🔄 Start Over</button>
      <button class="quick-btn" onclick="sendQuick('What are the best hotels near Universal?')">🏨 Hotels</button>
      <button class="quick-btn" onclick="sendQuick('Tell me about dining options')">🍽️ Dining</button>
    `;
  }

  function resetChat() {
    messages = [];
    progressFill.style.width = '0%';
    chatArea.innerHTML = '';
    quickReplies.innerHTML = `
      <button class="quick-btn" onclick="sendQuick('Family of 4 with kids ages 8 and 11')">👨‍👩‍👧‍👦 Family of 4</button>
      <button class="quick-btn" onclick="sendQuick('We want to visit this summer 2026')">☀️ Summer 2026</button>
      <button class="quick-btn" onclick="sendQuick('Our budget is around $3,000 total')">💵 ~$3K budget</button>
      <button class="quick-btn" onclick="sendQuick('We love Harry Potter and thrill rides')">⚡ Harry Potter fans</button>
    `;
    setTimeout(() => {
      addBotMessage("Hey there! 👋 I'm Voyager — your family travel deal finder.\n\nFirst up — how many people are in your group, and how old are the kids?");
    }, 300);
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || sendBtn.disabled) return;

    if (messages.length === 0) quickReplies.innerHTML = '';

    addUserMessage(text);
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    messages.push({ role: 'user', content: text });

    const typing = showTyping();

    try {
      const response = await fetch('/api/voyager-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });

      const data = await response.json();
      removeTyping();

      if (data.error) {
        addBotMessage("Sorry, I'm having trouble connecting. Please try again in a moment.");
        sendBtn.disabled = false;
        return;
      }

      addBotMessage(data.reply);
      messages.push({ role: 'assistant', content: data.reply });

      if (data.recommendation && data.recommendation.recommendation_ready) {
        showRecommendation(data.recommendation);
      }

      const stepCount = messages.filter(m => m.role === 'user').length;
      const pct = Math.min((stepCount / 6) * 100, 100);
      progressFill.style.width = pct + '%';

    } catch (error) {
      console.error('Chat error:', error);
      removeTyping();
      addBotMessage("Sorry, I couldn't reach the server. Please check your connection and try again.");
    }
    sendBtn.disabled = false;
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      addBotMessage("Hey there! 👋 I'm Voyager — your family travel deal finder.\n\nFirst up — how many people are in your group, and how old are the kids?");
    }, 600);
  });
</script>
</body>
</html>
